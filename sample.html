<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hero Section</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0d0d0d;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.15), transparent 60%),
                linear-gradient(135deg, #0d0d0d, #1a1a1a);
        }

        /* Content */
        .content {
            text-align: center;
            color: white;
        }

        /* Heading */
        .content h1 {
            font-size: 2.5rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 20px;
            color: #f5f5f5;
        }

        /* Button */
        .cta-btn {
            background: #ff8c00;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        /* Button Hover */
        .cta-btn:hover {
            background: #ffa733;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4);
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="content">
            <h1>Adaptive Logo Design<br>for Your Brand</h1>
            <button class="cta-btn">Explore More →</button>
        </div>
    </section>

</body>

</html>
